<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG XML Renderer</title>
</head>
<body>
  <canvas id="canvas" style="display: none;"></canvas>

  <script>
    function extractSvgMarkup(text) {
      if (typeof text !== "string") return "";
      const lower = text.toLowerCase();
      const start = lower.indexOf("<svg");
      if (start < 0) return "";

      const end = lower.lastIndexOf("</svg>");
      if (end > start) {
        return text.slice(start, end + 6).trim();
      }

      return text.slice(start).trim();
    }

    function parseSvgInput(dataStr) {
      const rawInput = typeof dataStr === "string" ? dataStr.trim() : "";
      if (!rawInput) {
        throw new Error("svgXml is required.");
      }

      if (rawInput.toLowerCase().startsWith("<svg")) {
        return rawInput;
      }

      let parsed;
      try {
        parsed = JSON.parse(rawInput);
      } catch (jsonError) {
        const recoveredSvg = extractSvgMarkup(rawInput);
        if (recoveredSvg) {
          return recoveredSvg;
        }
        throw new Error(`Invalid JSON input: ${jsonError.message}`);
      }

      let svgXml = "";
      if (typeof parsed === "string") {
        svgXml = parsed.trim();
      } else if (parsed && typeof parsed.svgXml === "string") {
        svgXml = parsed.svgXml.trim();
      }

      if (!svgXml) {
        svgXml = extractSvgMarkup(rawInput);
      }
      if (!svgXml) {
        throw new Error("svgXml is required.");
      }
      if (!svgXml.toLowerCase().includes("<svg")) {
        throw new Error("svgXml must contain a valid <svg> root element.");
      }

      return svgXml;
    }

    function loadImageFromSvg(svgXml) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([svgXml], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const image = new Image();

        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };

        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Unable to load SVG. Please verify the XML is valid."));
        };

        image.src = url;
      });
    }

    window["ai_edge_gallery_get_result"] = async (dataStr) => {
      try {
        const svgXml = parseSvgInput(dataStr || "{}");
        const image = await loadImageFromSvg(svgXml);

        const width = Math.max(1, Math.round(image.naturalWidth || 512));
        const height = Math.max(1, Math.round(image.naturalHeight || 512));

        const canvas = document.getElementById("canvas");
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        if (!ctx) {
          throw new Error("2D canvas context is unavailable.");
        }
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);

        return JSON.stringify({
          result: `Rendered SVG successfully (${width}x${height}).`,
          image: {
            base64: canvas.toDataURL("image/png")
          }
        });
      } catch (e) {
        return JSON.stringify({
          error: `Failed to render SVG: ${e.message}`
        });
      }
    };
  </script>
</body>
</html>
