<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG XML Renderer</title>
</head>
<body>
  <canvas id="canvas" style="display: none;"></canvas>

  <script>
    function parseSvgInput(dataStr) {
      const parsed = typeof dataStr === "string" && dataStr.trim().length > 0
        ? JSON.parse(dataStr)
        : {};
      const svgXml = typeof parsed.svgXml === "string" ? parsed.svgXml.trim() : "";
      if (!svgXml) {
        throw new Error("svgXml is required.");
      }
      if (!svgXml.toLowerCase().includes("<svg")) {
        throw new Error("svgXml must contain a valid <svg> root element.");
      }
      return svgXml;
    }

    function loadImageFromSvg(svgXml) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([svgXml], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const image = new Image();

        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };

        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Unable to load SVG. Please verify the XML is valid."));
        };

        image.src = url;
      });
    }

    window["ai_edge_gallery_get_result"] = async (dataStr) => {
      try {
        const svgXml = parseSvgInput(dataStr || "{}");
        const image = await loadImageFromSvg(svgXml);

        const width = Math.max(1, Math.round(image.naturalWidth || 512));
        const height = Math.max(1, Math.round(image.naturalHeight || 512));

        const canvas = document.getElementById("canvas");
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        if (!ctx) {
          throw new Error("2D canvas context is unavailable.");
        }
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);

        return JSON.stringify({
          result: `Rendered SVG successfully (${width}x${height}).`,
          image: {
            base64: canvas.toDataURL("image/png")
          }
        });
      } catch (e) {
        return JSON.stringify({
          error: `Failed to render SVG: ${e.message}`
        });
      }
    };
  </script>
</body>
</html>
