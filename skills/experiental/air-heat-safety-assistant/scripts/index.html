<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air and Heat Safety Assistant</title>
</head>
<body>
  <script>
    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function toFinite(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizeInput(parsed) {
      const latitude = toFinite(parsed.latitude, NaN);
      const longitude = toFinite(parsed.longitude, NaN);
      if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
        throw new Error("latitude and longitude are required numbers");
      }

      const hoursAhead = clamp(toFinite(parsed.hours_ahead, 12), 3, 24);
      const activity = String(parsed.activity_level || "moderate").toLowerCase();
      const sensitivity = String(parsed.sensitivity || "normal").toLowerCase();

      return {
        latitude,
        longitude,
        hoursAhead,
        activity_level: ["light", "moderate", "intense"].includes(activity) ? activity : "moderate",
        sensitivity: sensitivity === "sensitive" ? "sensitive" : "normal"
      };
    }

    async function fetchWeather(lat, lon) {
      const url =
        "https://api.open-meteo.com/v1/forecast?latitude=" + encodeURIComponent(lat) +
        "&longitude=" + encodeURIComponent(lon) +
        "&hourly=temperature_2m,apparent_temperature,relative_humidity_2m,uv_index" +
        "&forecast_days=2&timezone=auto";
      const response = await fetch(url, { method: "GET" });
      if (!response.ok) {
        throw new Error("Weather fetch failed with status " + response.status);
      }
      const json = await response.json();
      return json.hourly || {};
    }

    async function fetchAir(lat, lon) {
      const url =
        "https://air-quality-api.open-meteo.com/v1/air-quality?latitude=" + encodeURIComponent(lat) +
        "&longitude=" + encodeURIComponent(lon) +
        "&hourly=pm2_5,pm10,ozone,us_aqi&forecast_days=2&timezone=auto";
      const response = await fetch(url, { method: "GET" });
      if (!response.ok) {
        throw new Error("Air quality fetch failed with status " + response.status);
      }
      const json = await response.json();
      return json.hourly || {};
    }

    function buildIndexMap(times) {
      const map = {};
      for (let i = 0; i < times.length; i++) {
        map[String(times[i])] = i;
      }
      return map;
    }

    function activityHeatMultiplier(activityLevel) {
      if (activityLevel === "light") return 0.8;
      if (activityLevel === "intense") return 1.3;
      return 1;
    }

    function sensitivityMultiplier(sensitivity) {
      return sensitivity === "sensitive" ? 1.25 : 1;
    }

    function scoreHeat(apparentTempC, humidity, uvIndex, activityLevel) {
      let heatScore = 0;
      heatScore += clamp(apparentTempC - 24, 0, 20) * 2.8;
      heatScore += clamp(humidity - 55, 0, 40) * 0.6;
      heatScore += clamp(uvIndex - 3, 0, 10) * 5.5;
      heatScore *= activityHeatMultiplier(activityLevel);
      return clamp(heatScore, 0, 100);
    }

    function scoreAir(pm25, pm10, usAqi) {
      let airScore = 0;
      airScore += clamp(pm25 - 10, 0, 120) * 1.1;
      airScore += clamp(pm10 - 20, 0, 150) * 0.4;
      airScore += clamp(usAqi - 50, 0, 200) * 0.45;
      return clamp(airScore, 0, 100);
    }

    function riskBand(value) {
      if (value < 25) return "low";
      if (value < 50) return "moderate";
      if (value < 75) return "high";
      return "very_high";
    }

    function toLocalClock(timeStr) {
      const d = new Date(timeStr);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function safeNumber(arr, idx, fallback) {
      if (!Array.isArray(arr)) return fallback;
      const value = arr[idx];
      return Number.isFinite(value) ? value : fallback;
    }

    window["ai_edge_gallery_get_result"] = async (data) => {
      try {
        const parsed = data ? JSON.parse(data) : {};
        const input = normalizeInput(parsed);

        const warnings = [];
        let weather;
        let air;

        try {
          weather = await fetchWeather(input.latitude, input.longitude);
        } catch (e) {
          warnings.push("Weather data unavailable: " + e.message);
          weather = {};
        }

        try {
          air = await fetchAir(input.latitude, input.longitude);
        } catch (e) {
          warnings.push("Air quality data unavailable: " + e.message);
          air = {};
        }

        const wTimes = Array.isArray(weather.time) ? weather.time : [];
        const aTimes = Array.isArray(air.time) ? air.time : [];

        if (wTimes.length === 0 && aTimes.length === 0) {
          throw new Error("No hourly weather or air quality data returned");
        }

        const aMap = buildIndexMap(aTimes);
        const now = Date.now();
        const horizonEnd = now + input.hoursAhead * 60 * 60 * 1000;

        const rows = [];
        for (let i = 0; i < wTimes.length; i++) {
          const t = new Date(wTimes[i]).getTime();
          if (!Number.isFinite(t) || t < now || t > horizonEnd) {
            continue;
          }

          const airIdx = typeof aMap[wTimes[i]] === "number" ? aMap[wTimes[i]] : -1;
          const temp = safeNumber(weather.temperature_2m, i, 24);
          const apparent = safeNumber(weather.apparent_temperature, i, temp);
          const humidity = safeNumber(weather.relative_humidity_2m, i, 55);
          const uv = safeNumber(weather.uv_index, i, 2);
          const pm25 = safeNumber(air.pm2_5, airIdx, 8);
          const pm10 = safeNumber(air.pm10, airIdx, 18);
          const ozone = safeNumber(air.ozone, airIdx, 65);
          const aqi = safeNumber(air.us_aqi, airIdx, 45);

          const heatScore = scoreHeat(apparent, humidity, uv, input.activity_level);
          const airScore = scoreAir(pm25, pm10, aqi);
          const combined = clamp(
            (heatScore * 0.52 + airScore * 0.48) * sensitivityMultiplier(input.sensitivity),
            0,
            100
          );

          rows.push({
            time: wTimes[i],
            local_time: toLocalClock(wTimes[i]),
            risk_score: Math.round(combined),
            risk_band: riskBand(combined),
            drivers: {
              heat: Math.round(heatScore),
              air_quality: Math.round(airScore),
              uv_index: Math.round(uv * 10) / 10
            },
            conditions: {
              temperature_c: Math.round(temp * 10) / 10,
              apparent_temperature_c: Math.round(apparent * 10) / 10,
              humidity_pct: Math.round(humidity),
              pm2_5_ugm3: Math.round(pm25 * 10) / 10,
              pm10_ugm3: Math.round(pm10 * 10) / 10,
              ozone_ugm3: Math.round(ozone * 10) / 10,
              us_aqi: Math.round(aqi)
            }
          });
        }

        if (rows.length === 0) {
          throw new Error("No forecast rows inside requested time horizon");
        }

        const sortedBySafe = rows.slice().sort((a, b) => a.risk_score - b.risk_score);
        const sortedByRisk = rows.slice().sort((a, b) => b.risk_score - a.risk_score);

        return JSON.stringify({
          result: {
            input: input,
            safest_windows: sortedBySafe.slice(0, 3),
            highest_risk_windows: sortedByRisk.slice(0, 2),
            hourly_risk: rows,
            warnings: warnings,
            data_sources: [
              "Open-Meteo forecast API",
              "Open-Meteo air quality API"
            ]
          }
        });
      } catch (error) {
        return JSON.stringify({
          error: "Air and Heat Safety Assistant failed: " + error.message
        });
      }
    };
  </script>
</body>
</html>
