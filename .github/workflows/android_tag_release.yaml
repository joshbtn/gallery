name: Android Tag Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_apk:
    name: Build and Upload APK to Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          apk_path=$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          if [[ -z "$apk_path" ]]; then
            echo 'No APK found under app/build/outputs/apk/release'
            exit 1
          fi
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: Android/src/${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Create or update GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: Android/src/${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
