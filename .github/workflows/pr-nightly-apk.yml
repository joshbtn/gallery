name: PR Nightly APK

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'Android/**'

# Cancel any in-progress run for the same PR when new commits arrive.
concurrency:
  group: nightly-apk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-nightly-apk:
    name: Build nightly debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x Android/src/gradlew

      - name: Build nightly debug APK
        working-directory: Android/src
        run: ./gradlew assembleNightlyDebug --no-daemon

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find Android/src/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-debug-apk-pr${{ github.event.pull_request.number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 14

      - name: Comment APK download link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactName = `nightly-debug-apk-pr${context.payload.pull_request.number}`;
            const body = [
              '## 📦 Nightly APK',
              '',
              `A debug build of the **nightly** flavour is available for this PR.`,
              `The nightly app uses the package ID \`com.google.aiedge.gallery.nightly\` so it installs alongside any existing Gallery install.`,
              '',
              `**[⬇ Download artifact \`${artifactName}\`](${runUrl})**`,
              '',
              '_Artifacts are kept for 14 days._',
            ].join('\n');

            // Update existing bot comment if present, otherwise create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Nightly APK')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
